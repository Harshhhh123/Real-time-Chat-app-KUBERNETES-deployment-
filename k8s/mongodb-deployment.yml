apiVersion: v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: chat-app
  spec:
  replicas: 3 
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      name: mongodb-pod
      namespace: chat-app
      labels:
        app: mongodb
    spec:
     containers:
      - name: mongodb-container
        image: mongo:latest
        ports:
        - containerPort: 27017
       
